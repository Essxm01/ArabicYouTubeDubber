# Project-wide Gradle settings.
# Size of the daemon JVM heap
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Dhttp.socketTimeout=600000 -Dhttps.socketTimeout=600000

systemProp.http.connectionTimeout=600000
systemProp.http.socketTimeout=600000
systemProp.https.connectionTimeout=600000
systemProp.https.socketTimeout=600000

# Use AndroidX libraries
android.useAndroidX=true

# Enable Jetifier for legacy support (if needed)
android.enableJetifier=true

# Kotlin style
kotlin.code.style=official
